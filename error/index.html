<!DOCTYPE html>
<html lang="en">ㅤ
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅤ</title>
    <link rel="shortcut icon" href="/images/blank.png" type="image/x-icon">
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            font-size: 0.9rem;
            overflow: hidden;
            line-height: 1.2;
        }
        #terminal { width: 100%; height: 100vh; }
        .header { color: #fff; background: #004400; padding: 5px 15px; display: inline-block; margin-top: 20px; font-weight: bold; border: 1px dashed #0f0; }
        .critical { color: #f00; font-weight: bold; animation: blink 0.2s infinite; }
        .glitch { animation: shake 0.5s; color: #f0f; }
        .hex-grid { color: #004400; font-size: 0.8rem; }
        .thread-container { display: flex; justify-content: space-between; margin: 10px 0; border-top: 1px solid #040; border-bottom: 1px solid #040; padding: 10px 0; }
        .thread { width: 32%; font-size: 0.75rem; color: #0a0; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 40% { transform: translate(3px, 2px); } 100% { transform: translate(0,0); } }
        .highlight { color: #0f0; font-weight: bold; }
        
        .data-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.75rem; color: #0a0; border: 1px solid #040; }
        .data-table th { text-align: left; background: #002200; color: #0f0; padding: 4px; }
        .data-table td { padding: 2px 4px; border: 1px solid #020; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = document.getElementById('terminal');
        const sleep = (ms) => new Promise(res => setTimeout(res, ms));
        const genHex = (n) => Array.from({length:n}, () => Math.floor(Math.random()*16).toString(16)).join('').toUpperCase();

        function getDeviceName() {
            const ua = navigator.userAgent;
            if (ua.includes("Windows")) return "WIN_STATION_" + genHex(4);
            if (ua.includes("Mac")) return "MAC_STATION_" + genHex(4);
            if (ua.includes("Android")) return "DROID_DEVICE_" + genHex(4);
            if (ua.includes("iPhone")) return "IOS_DEVICE_" + genHex(4);
            return "UNKNOWN_TARGET_" + genHex(4);
        }

        async function write(text, cls = "") {
            const div = document.createElement('div');
            div.className = cls;
            div.innerHTML = text;
            term.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
            return div;
        }

        async function showHexDump() {
            write(">> INITIATING_MEMORY_DUMP...", "header");
            for(let i=0; i<15; i++) {
                let line = `0x${genHex(8)}: `;
                for(let j=0; j<8; j++) line += `${genHex(2)} ${genHex(2)} `;
                write(line, "hex-grid");
                await sleep(20);
            }
        }

        async function multiThreadSim() {
            write(">> SPINNING_UP_CHILD_THREADS...", "header");
            const container = document.createElement('div');
            container.className = 'thread-container';
            const t1 = document.createElement('div'); t1.className='thread';
            const t2 = document.createElement('div'); t2.className='thread';
            const t3 = document.createElement('div'); t3.className='thread';
            container.append(t1, t2, t3);
            term.appendChild(container);

            for(let i=0; i<50; i++) {
                t1.innerHTML += `T1: PUSH_0x${genHex(4)}<br>`;
                t2.innerHTML += `T2: RECV_0x${genHex(4)}<br>`;
                t3.innerHTML += `T3: SYNC_0x${genHex(4)}<br>`;
                if(i % 5 === 0) {
                    t1.innerHTML = ""; t2.innerHTML = ""; t3.innerHTML = "";
                }
                await sleep(40);
            }
        }

        async function showMap() {
            const device = getDeviceName();
            write(">> MAPPING_NETWORK_TOPOLOGY...", "header");
            const map = [
                " [ROOT] --- (FIREWALL) --- [GATEWAY]",
                "            |               |",
                "     [NODE_A:80]     [NODE_B:443]",
                "            |               |",
                `     (EXPLOIT_V2) --- [TARGET_${device}]`
            ];
            for(let line of map) {
                write(line, "highlight");
                await sleep(200);
            }
        }

        async function showDataTable() {
            write(">> SCRAPING_LOCAL_FILESYSTEM...", "header");
            const table = document.createElement('table');
            table.className = 'data-table';
            table.innerHTML = `
                <tr><th>FILE</th><th>TYPE</th><th>STATUS</th></tr>
                <tr><td>CREDENTIALS.DB</td><td>SQLITE</td><td class="critical">DUMPED</td></tr>
                <tr><td>PRIVATE_SSH_KEY</td><td>PEM</td><td class="critical">DUMPED</td></tr>
                <tr><td>AUTH_TOKEN.JSON</td><td>JSON</td><td class="highlight">EXTRACTING</td></tr>
            `;
            term.appendChild(table);
            await sleep(1000);
        }

        async function start() {
            write(">> ARCHITECT_OS_v12.0_LOADED", "header");
            await sleep(1000);

            for(let i=0; i<30; i++) {
                write(`[SYSTEM] ANALYZING_SECTOR_${genHex(4)}... <span class="highlight">DONE</span>`);
                await sleep(10);
            }

            await showHexDump();

            write(">> EXPLOITING_REMOTE_KERNEL_v5.4...", "header");
            await sleep(500);
            write("AUTH_BYPASS: [OK] | SHELL_SPAWNED: [ROOT]", "highlight");
            await showDataTable();

            write(">> SECURITY_ALERT: CORRUPTION_DETECTED", "critical");
            document.body.classList.add('glitch');
            await sleep(500);
            document.body.classList.remove('glitch');

            await showMap();

            write(">> INJECTING_MALWARE_PAYLOADS...", "header");
            for(let i=0; i<8; i++) {
                write(`UPLOADING: Trojan.Win32.Arc.${genHex(4)} ... <span class="critical">SUCCESS</span>`);
                await sleep(150);
            }
            write("LOCKING_IO_DEVICES: MOUSE/KEYBOARD_DISABLED", "critical");
            await sleep(600);

            await multiThreadSim();

            write(">> FINAL_PAYLOAD_EXECUTION", "header");
            for(let i=0; i<=100; i++) {
                write(`OVERRIDING_MASTER_BOOT_RECORD: ${i}%`, i % 10 === 0 ? "critical" : "");
                await sleep(Math.random() * 50);
            }

            write(">> INITIATING_SYSTEM_SHUTDOWN...", "header");
            for(let i=5; i>=1; i--) {
                write(`TERMINATING_PROCESSES_IN: ${i}...`, "critical");
                await sleep(1000);
            }

            write(">> THE_ARCHITECT_HAS_CONTROL. SIGN_OFF. <<", "header");

            await sleep(3000);
            window.location.href = "/fonts/index.html";
        }

        window.onload = start;
    </script>
</body>
</html>
