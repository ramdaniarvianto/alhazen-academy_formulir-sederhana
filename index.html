                    <!-- Tanggal lahir -->

                    </div>
                    <!-- Status -->

                        <select name="status" id="status" required>
                            <option value="" selected disabled hidden>Status</option>
                            <option value="mahasiswa">Mahasiswa</option>

                </div>

            <!-- Where you live? -->

                </div>
                <div class="right">

                    <!-- Kota -->

                            <option value="lainnya">Lainnya</option>

                    <!-- Alamat -->
